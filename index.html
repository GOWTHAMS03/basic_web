<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Styling</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <h1>Basic Styling</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="container">
        <section class="card">
            <h2>Typography</h2>
            <p>This is a paragraph demonstrating basic text styling. <strong>Bold text</strong> and <em>italic text</em> are supported.</p>
        </section>

        <section class="card">
            <h2>Buttons</h2>
            <button class="btn btn-primary" id="primaryBtn">Primary</button>
            <button class="btn btn-secondary" id="secondaryBtn">Secondary</button>
            <button class="btn btn-danger">Danger</button>
        </section>

        <section class="card">
            <h2>Form</h2>
            <form id="demoForm">
                <div class="form-group">
                    <label for="nameInput">Name</label>
                    <input type="text" id="nameInput" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label for="emailInput">Email</label>
                    <input type="email" id="emailInput" placeholder="Enter your email">
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </section>

        <div id="toast" class="toast"></div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Basic Styling Demo</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
